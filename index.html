<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red de Distribuidores</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111;
      --panel: #111;
      --text: #f8f2d1;
      --accent: #ffb800;
      --accent-dark: #ff8500;
      --border: rgba(255, 255, 255, 0.12);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      font-family: "Inter", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background: radial-gradient(circle at top, rgba(255, 184, 0, 0.18), transparent 35%),
                  linear-gradient(180deg, #0d0d0d 0%, #111 100%);
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .container {
      width: min(540px, 100%);
      padding: 32px 28px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: rgba(10, 10, 10, 0.96);
      box-shadow: var(--shadow);
    }

    .logo {
      max-width: 160px;
      margin: 0 auto 28px;
      display: block;
    }

    h1 {
      font-size: clamp(2.1rem, 4vw, 2.6rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
    }

    p {
      color: #dad0b0;
      line-height: 1.8;
      margin-bottom: 30px;
      font-size: 1rem;
    }

    .button-wrap {
      display: grid;
      gap: 18px;
      margin-bottom: 26px;
    }

    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 22px;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      background: #ffd200;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      box-shadow: 0 18px 30px rgba(255, 210, 0, 0.2);
    }

    .whatsapp-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 36px rgba(255, 210, 0, 0.28);
      background: #ffea60;
    }

    .whatsapp-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 0.5px rgba(0, 0, 0, .3));
    }

    .footer {
      font-size: 0.88rem;
      color: #b8b08a;
      line-height: 1.7;
    }

    .footer a {
      color: #f0e8ba;
      text-decoration: underline;
    }

    @media (max-width: 520px) {
      .container {
        padding: 24px 18px;
      }

      h1 {
        font-size: 2.2rem;
      }

      p {
        font-size: 0.96rem;
      }

      .button-wrap {
        gap: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <img src="logo.png" alt="Logo" class="logo" />
    <h1>SÉ NUESTRO SOCIO COMERCIAL</h1>
    <p>Obtén precios directos de fábrica y distribuye calidad certificada en todo México.</p>

    <div class="button-wrap">
      <a class="whatsapp-btn" href="https://api.whatsapp.com/send?phone=524771474482&text=Hola%2C%20solicito%20información%20detallada%20para%20incorporarme%20como%20distribuidor%20autorizado%20de%20su%20marca.%20Quedo%20atent@%2C%20gracias." target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
          <path d="M20.52 3.48A11.87 11.87 0 0 0 12 1.2C6 1.2 1.2 6 1.2 12.02c0 2.11.55 4.16 1.6 5.95L1 23l4.31-1.42a11.77 11.77 0 0 0 6.72 2.04h.01c6.02 0 10.82-4.8 10.82-10.82 0-2.9-1.13-5.63-3.19-7.52Zm-8.58 16.26h-.01a9.81 9.81 0 0 1-5.01-1.34l-.36-.21-3.23 1.06 1.08-3.15-.23-.36a9.75 9.75 0 0 1-1.49-5.43c0-5.4 4.4-9.8 9.82-9.8 2.62 0 5.08 1.02 6.92 2.87a9.68 9.68 0 0 1 2.88 6.91c0 5.4-4.4 9.8-9.81 9.8Zm5.37-7.45c-.29-.15-1.7-.84-1.96-.93s-.45-.14-.64.15-.73.93-.9 1.12-.33.22-.62.07a6.2 6.2 0 0 1-1.82-1.12 6.82 6.82 0 0 1-1.27-1.58c-.14-.24 0-.37.11-.5.12-.12.29-.3.43-.45.14-.15.18-.26.27-.43.09-.16.05-.3-.02-.44-.07-.15-.63-1.53-.86-2.11-.23-.56-.47-.48-.64-.49h-.55c-.18 0-.45.07-.69.34-.24.28-.92.9-.92 2.2s.94 2.56 1.07 2.74c.14.17 1.85 2.86 4.48 4.01.63.27 1.12.43 1.5.55.63.21 1.2.18 1.65.11.5-.08 1.7-.69 1.94-1.36.24-.67.24-1.24.17-1.36-.07-.13-.28-.2-.59-.35Z"/>
        </svg>
        Enviar mensaje por WhatsApp
      </a>
    </div>

    <footer class="footer">
      <p>&copy; 2026 Todos los derechos reservados.</p>
      <p><a href="#">Política de privacidad</a> | <a href="#">Términos y condiciones</a></p>
    </footer>
  </main>
</body>
</html>
